<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profit Splitter Dashboard</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load React & Babel for in-browser rendering -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Load html2pdf.js for guaranteed color PDF downloads -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-zinc-100/50">
  <div id="root"></div>

  <!-- Application Logic -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline Icons ---
    const SvgIcon = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Plus = (p) => <SvgIcon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></SvgIcon>;
    const Trash2 = (p) => <SvgIcon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></SvgIcon>;
    const Printer = (p) => <SvgIcon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></SvgIcon>;
    const Download = (p) => <SvgIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></SvgIcon>;
    const RefreshCw = (p) => <SvgIcon {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></SvgIcon>;
    const CalendarDays = (p) => <SvgIcon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></SvgIcon>;
    const Settings2 = (p) => <SvgIcon {...p}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="8" cy="17" r="3"/></SvgIcon>;
    const Palette = (p) => <SvgIcon {...p}><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></SvgIcon>;
    const Users = (p) => <SvgIcon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></SvgIcon>;
    const TrendingUp = (p) => <SvgIcon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></SvgIcon>;
    const TrendingDown = (p) => <SvgIcon {...p}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></SvgIcon>;
    const Wallet = (p) => <SvgIcon {...p}><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></SvgIcon>;
    const Copy = (p) => <SvgIcon {...p}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></SvgIcon>;
    const Check = (p) => <SvgIcon {...p}><polyline points="20 6 9 17 4 12"/></SvgIcon>;
    const ChevronRight = (p) => <SvgIcon {...p}><polyline points="9 18 15 12 9 6"/></SvgIcon>;
    const FileSpreadsheet = (p) => <SvgIcon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></SvgIcon>;
    const PieChart = (p) => <SvgIcon {...p}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></SvgIcon>;

    // --- Constants & Defaults ---
    const CURRENCIES = [
      { code: 'USD', symbol: '$', name: 'US Dollar' },
      { code: 'EUR', symbol: '€', name: 'Euro' },
      { code: 'GBP', symbol: '£', name: 'British Pound' },
      { code: 'CAD', symbol: 'C$', name: 'Canadian Dollar' },
      { code: 'AUD', symbol: 'A$', name: 'Australian Dollar' },
      { code: 'INR', symbol: '₹', name: 'Indian Rupee' },
      { code: 'BDT', symbol: '৳', name: 'Bangladeshi Taka' },
      { code: 'KES', symbol: 'KSh', name: 'Kenyan Shilling' },
    ];

    const PRESET_COLORS = [
      { name: 'Charcoal', value: '#27272a' },
      { name: 'Indigo', value: '#4338ca' },
      { name: 'Emerald', value: '#059669' },
      { name: 'Rose', value: '#e11d48' },
      { name: 'Amber', value: '#d97706' },
    ];

    const generateRandomID = () => `REP-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;

    const getToday = () => {
      const d = new Date();
      return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    };

    const DEFAULT_REPORT = {
      id: generateRandomID(),
      dateGenerated: getToday(),
      periodStart: '01/03/2026',
      periodEnd: '31/03/2026',
      currency: 'USD',
      color: '#4338ca', 
      customColors: [],
      
      businessName: 'Our Digital Empire',
      
      partner1: { name: 'Partner A', split: 50 },
      partner2: { name: 'Partner B', split: 50 },
      
      revenue: [
        { id: 1, source: 'Gumroad Sales (E-book)', amount: 4500 },
        { id: 2, source: 'Gumroad Sales (Templates)', amount: 1250 },
      ],
      
      platformFees: 575, 
      refunds: 150,
      
      expenses: [
        { id: 1, description: 'Figma Subscription', amount: 15, paidBy: 'partner1' },
        { id: 2, description: 'Notion Subscription', amount: 10, paidBy: 'partner2' },
        { id: 3, description: 'Facebook Ads', amount: 300, paidBy: 'shared' },
      ],
      
      notes: 'Great month! Ad spend converted really well on TikTok.',
      status: 'pending', 
    };

    // --- Helper Components ---
    const Input = ({ label, value, onChange, placeholder, className = "", rightAction, type="text", min, step }) => (
      <div className={`flex flex-col mb-4 ${className}`}>
        {label && <label className="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5">{label}</label>}
        <div className="relative flex items-center">
          <input
            type={type} min={min} step={step} value={value} onChange={onChange} placeholder={placeholder}
            className="w-full px-3.5 py-2.5 border border-zinc-200 rounded-lg text-sm text-zinc-800 placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all bg-zinc-50/50 focus:bg-white shadow-sm"
          />
          {rightAction && <div className="absolute right-2 flex items-center">{rightAction}</div>}
        </div>
      </div>
    );

    const SectionPanel = ({ title, icon: Icon, children, className = "" }) => (
      <section className={`bg-white p-4 sm:p-6 rounded-2xl border border-zinc-200/80 shadow-sm mb-6 ${className}`}>
        <div className="flex items-center gap-2 mb-4 sm:mb-6 border-b border-zinc-100 pb-3">
          <Icon className="w-5 h-5 text-zinc-400" />
          <h2 className="text-base font-semibold text-zinc-800">{title}</h2>
        </div>
        {children}
      </section>
    );

    // --- Main Application ---
    function App() {
      const [data, setData] = useState(DEFAULT_REPORT);
      const [activeTab, setActiveTab] = useState('editor');
      const [copied, setCopied] = useState(false);
      const [isDownloading, setIsDownloading] = useState(false);
      
      const [showHexInput, setShowHexInput] = useState(false);
      const [tempHex, setTempHex] = useState('');

      useEffect(() => {
        const saved = localStorage.getItem('digital_biz_settlement');
        if (saved) {
          try { 
            const parsed = JSON.parse(saved);
            if(!parsed.customColors) parsed.customColors = [];
            // Ensure split logic is present in older saves
            if(parsed.partner1 && typeof parsed.partner1.split === 'undefined') parsed.partner1.split = 50;
            if(parsed.partner2 && typeof parsed.partner2.split === 'undefined') parsed.partner2.split = 50;
            setData(parsed); 
          } 
          catch (e) { console.error("Parse error", e); }
        }
      }, []);

      useEffect(() => {
        localStorage.setItem('digital_biz_settlement', JSON.stringify(data));
      }, [data]);

      // --- Handlers ---
      const updateField = (field, value) => setData(prev => ({ ...prev, [field]: value }));
      const updateNestedField = (section, field, value) => setData(prev => ({ ...prev, [section]: { ...prev[section], [field]: value } }));
      
      const handleSplitChange = (partner, value) => {
        let num = parseFloat(value);
        if (isNaN(num)) num = 0;
        if (num > 100) num = 100;
        if (num < 0) num = 0;

        setData(prev => ({
          ...prev,
          partner1: { ...prev.partner1, split: partner === 'partner1' ? num : (100 - num) },
          partner2: { ...prev.partner2, split: partner === 'partner2' ? num : (100 - num) }
        }));
      };

      const addRevenue = () => setData(prev => ({ ...prev, revenue: [...prev.revenue, { id: Date.now(), source: '', amount: 0 }] }));
      const updateRevenue = (id, field, value) => setData(prev => ({ ...prev, revenue: prev.revenue.map(r => r.id === id ? { ...r, [field]: value } : r) }));
      const removeRevenue = (id) => setData(prev => ({ ...prev, revenue: prev.revenue.filter(r => r.id !== id) }));

      const addExpense = () => setData(prev => ({ ...prev, expenses: [...prev.expenses, { id: Date.now(), description: '', amount: 0, paidBy: 'shared' }] }));
      const updateExpense = (id, field, value) => setData(prev => ({ ...prev, expenses: prev.expenses.map(e => e.id === id ? { ...e, [field]: value } : e) }));
      const removeExpense = (id) => setData(prev => ({ ...prev, expenses: prev.expenses.filter(e => e.id !== id) }));

      const clearData = () => { if(confirm("Clear all data and start a fresh report?")) setData(DEFAULT_REPORT); };
      const autoGenID = () => updateField('id', generateRandomID());

      const handleSaveCustomColor = () => {
        const isValidHex = /^#([0-9A-F]{3}){1,2}$/i.test(tempHex);
        if (isValidHex) {
          updateField('color', tempHex);
          const newCustomColors = [...(data.customColors || [])];
          if (!newCustomColors.includes(tempHex)) {
            newCustomColors.push(tempHex);
            updateField('customColors', newCustomColors);
          }
          setShowHexInput(false);
          setTempHex('');
        } else {
          alert('Please enter a valid hex code, starting with # (e.g., #FF5733)');
        }
      };

      // --- HTML to PDF Engine ---
      const handleDownloadPDF = () => {
        setIsDownloading(true);
        const element = document.getElementById('preview-container');
        
        const opt = {
          margin:       0,
          filename:     `Settlement_${data.id}.pdf`,
          image:        { type: 'jpeg', quality: 1 },
          html2canvas:  { scale: 2, useCORS: true, logging: false },
          jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        setTimeout(() => {
          window.html2pdf().set(opt).from(element).save().then(() => {
            setIsDownloading(false);
          });
        }, 300);
      };

      // --- Financial Calculations ---
      const currencySymbol = CURRENCIES.find(c => c.code === data.currency)?.symbol || '$';
      
      const totalRevenue = data.revenue.reduce((sum, item) => sum + (parseFloat(item.amount || 0)), 0);
      const totalOpExpenses = data.expenses.reduce((sum, item) => sum + (parseFloat(item.amount || 0)), 0);
      const totalDeductions = parseFloat(data.platformFees || 0) + parseFloat(data.refunds || 0) + totalOpExpenses;
      
      const netProfit = totalRevenue - totalDeductions;
      
      // Dynamic Split
      const p1SplitPerc = parseFloat(data.partner1.split || 50);
      const p2SplitPerc = parseFloat(data.partner2.split || 50);

      const partner1BaseShare = netProfit * (p1SplitPerc / 100);
      const partner2BaseShare = netProfit * (p2SplitPerc / 100);

      const p1Reimbursement = data.expenses.filter(e => e.paidBy === 'partner1').reduce((sum, item) => sum + (parseFloat(item.amount || 0)), 0);
      const p2Reimbursement = data.expenses.filter(e => e.paidBy === 'partner2').reduce((sum, item) => sum + (parseFloat(item.amount || 0)), 0);

      const partner1FinalPayout = partner1BaseShare + p1Reimbursement;
      const partner2FinalPayout = partner2BaseShare + p2Reimbursement;

      const formatCur = (amount) => new Intl.NumberFormat('en-US', { style: 'currency', currency: data.currency }).format(amount);

      // --- Copy to Google Sheets ---
      const handleCopyToSheets = () => {
        const tsvData = [
          ['Report ID', 'Generated', 'Period Start', 'Period End', 'Gross Revenue', 'Platform Fees & Refunds', 'Op Expenses', 'Net Profit', `${data.partner1.name} Base Share (${p1SplitPerc}%)`, `${data.partner1.name} Reimbursement`, `${data.partner1.name} Total Payout`, `${data.partner2.name} Base Share (${p2SplitPerc}%)`, `${data.partner2.name} Reimbursement`, `${data.partner2.name} Total Payout`, 'Status'],
          [
            data.id, 
            data.dateGenerated, 
            data.periodStart,
            data.periodEnd,
            formatCur(totalRevenue), 
            formatCur(parseFloat(data.platformFees || 0) + parseFloat(data.refunds || 0)),
            formatCur(totalOpExpenses), 
            formatCur(netProfit), 
            formatCur(partner1BaseShare), 
            formatCur(p1Reimbursement),
            formatCur(partner1FinalPayout),
            formatCur(partner2BaseShare),
            formatCur(p2Reimbursement),
            formatCur(partner2FinalPayout),
            data.status === 'settled' ? 'Settled' : 'Pending'
          ]
        ].map(row => row.join('\t')).join('\n');

        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(tsvData).then(() => showCopied());
        } else {
          const textArea = document.createElement("textarea");
          textArea.value = tsvData;
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try { document.execCommand('copy'); showCopied(); } catch (err) { console.error(err); }
          document.body.removeChild(textArea);
        }
      };

      const showCopied = () => {
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div className="min-h-screen font-sans text-zinc-900 flex flex-col selection:bg-indigo-200">
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
            body { font-family: 'Inter', sans-serif; }
            
            /* --- NATIVE BROWSER PRINT STYLES --- */
            @media print {
              @page { size: A4 portrait; margin: 0; }
              body, html { background: white !important; }
              .no-print { display: none !important; }
              body, #root, .min-h-screen, main, .print-preview-wrapper { 
                display: block !important;
                height: auto !important; 
                min-height: auto !important; 
                overflow: visible !important; 
                position: static !important;
                width: 100% !important;
              }
              .print-preview-wrapper { padding: 0 !important; background: transparent !important; }
              #preview-container { 
                box-shadow: none !important; border: none !important; margin: 0 !important;
                width: 100% !important; max-width: 100% !important; min-height: auto !important; height: auto !important;
                position: relative !important; page-break-inside: avoid !important;
              }
              * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
              .print-grid-cols-2 { display: grid !important; grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
              .print-grid-cols-3 { display: grid !important; grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
              .print-flex-row { display: flex !important; flex-direction: row !important; }
              .print-w-half { width: 50% !important; }
              .print-divider-v { display: block !important; width: 1px !important; height: 64px !important; }
              .print-divider-h { display: none !important; }
            }
          `}</style>

          {/* --- Header --- */}
          <header className="bg-white border-b border-zinc-200 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between sticky top-0 z-20 no-print shadow-sm flex-wrap gap-3">
            <div className="flex items-center gap-2 sm:gap-3 text-zinc-800">
              <div className="bg-indigo-600 p-1.5 sm:p-2 rounded-lg text-white">
                <PieChart className="w-4 h-4 sm:w-5 sm:h-5" />
              </div>
              <span className="font-bold text-base sm:text-lg tracking-tight">Profit<span className="text-indigo-600 font-medium">Splitter</span></span>
            </div>
            
            {/* Mobile Tabs */}
            <div className="md:hidden flex bg-zinc-100 p-1 rounded-lg border border-zinc-200 w-full sm:w-auto order-last sm:order-none justify-center">
              <button onClick={() => setActiveTab('editor')} className={`flex-1 sm:flex-none px-4 py-1.5 rounded-md text-sm font-semibold transition-all ${activeTab === 'editor' ? 'bg-white shadow text-zinc-900' : 'text-zinc-500'}`}>Edit Data</button>
              <button onClick={() => setActiveTab('preview')} className={`flex-1 sm:flex-none px-4 py-1.5 rounded-md text-sm font-semibold transition-all ${activeTab === 'preview' ? 'bg-white shadow text-zinc-900' : 'text-zinc-500'}`}>View Report</button>
            </div>

            <div className="flex items-center gap-2 sm:gap-4 ml-auto sm:ml-0">
              <button onClick={handleCopyToSheets} className={`hidden md:flex items-center gap-2 px-3 py-2 sm:px-4 sm:py-2.5 rounded-xl text-xs sm:text-sm font-semibold transition-all ${copied ? 'bg-emerald-100 text-emerald-700' : 'bg-zinc-100 text-zinc-700 hover:bg-zinc-200'}`}>
                {copied ? <Check className="w-4 h-4" /> : <FileSpreadsheet className="w-4 h-4" />}
                <span className="hidden lg:inline">{copied ? 'Copied' : 'Copy Row to Sheets'}</span>
              </button>
              
              {/* Native Print */}
              <button onClick={() => window.print()} className="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-900 text-white px-3 py-2 sm:px-4 sm:py-2.5 rounded-xl font-medium transition-all shadow-md active:scale-95 text-xs sm:text-sm">
                <Printer className="w-4 h-4" />
                <span className="hidden sm:inline">Print</span>
              </button>

              {/* Download PDF (html2pdf Engine) */}
              <button 
                onClick={handleDownloadPDF} 
                disabled={isDownloading}
                className={`flex items-center gap-2 text-white px-3 py-2 sm:px-5 sm:py-2.5 rounded-xl font-medium transition-all shadow-md active:scale-95 text-xs sm:text-sm ${isDownloading ? 'bg-indigo-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700'}`}
              >
                {isDownloading ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Download className="w-4 h-4" />}
                <span className="hidden sm:inline">{isDownloading ? 'Generating...' : 'Download PDF'}</span>
              </button>
            </div>
          </header>

          {/* --- Main Workspace --- */}
          <main className="flex-1 flex flex-col md:flex-row overflow-hidden max-w-[1800px] w-full mx-auto relative">
            
            {/* === EDITOR (LEFT) === */}
            <div className={`w-full md:w-[500px] lg:w-[580px] bg-zinc-50/80 border-r border-zinc-200 overflow-y-auto no-print ${activeTab === 'editor' ? 'block' : 'hidden md:block'}`}>
              <div className="p-3 sm:p-6 lg:p-8">
                
                {/* Setup & Meta */}
                <SectionPanel title="Report Configuration" icon={Settings2}>
                  <div className="flex flex-col sm:flex-row gap-4 mb-4">
                    <Input label="Business / Project Name" value={data.businessName} onChange={e => updateField('businessName', e.target.value)} className="flex-1 !mb-0" />
                    <div className="flex-1">
                      <label className="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Currency</label>
                      <div className="relative">
                        <select value={data.currency} onChange={(e) => updateField('currency', e.target.value)} className="w-full px-3.5 py-2.5 border border-zinc-200 rounded-lg text-sm bg-zinc-50 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 outline-none appearance-none">
                          {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.name} ({c.symbol})</option>)}
                        </select>
                        <ChevronRight className="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 rotate-90 text-zinc-400 pointer-events-none" />
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <Input label="Report ID" value={data.id} onChange={e => updateField('id', e.target.value)} className="!mb-0" rightAction={
                      <button onClick={autoGenID} className="p-1.5 text-zinc-400 hover:text-zinc-800 hover:bg-zinc-100 rounded-md transition-colors"><RefreshCw className="w-4 h-4" /></button>
                    }/>
                    <Input label="Date Generated" value={data.dateGenerated} onChange={e => updateField('dateGenerated', e.target.value)} className="!mb-0" />
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <Input label="Period Start (DD/MM/YYYY)" value={data.periodStart} onChange={e => updateField('periodStart', e.target.value)} className="!mb-0" />
                    <Input label="Period End (DD/MM/YYYY)" value={data.periodEnd} onChange={e => updateField('periodEnd', e.target.value)} className="!mb-0" />
                  </div>

                  <div className="mt-6 border-t border-zinc-100 pt-4">
                    <label className="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2 block">Theme Color</label>
                    <div className="flex flex-wrap items-center gap-2">
                      {PRESET_COLORS.map(c => (
                        <button 
                          key={c.name} onClick={() => updateField('color', c.value)}
                          className={`w-8 h-8 rounded-full border-2 transition-all ${data.color === c.value ? 'border-zinc-900 scale-110 shadow-md' : 'border-transparent hover:scale-110'}`}
                          style={{ backgroundColor: c.value }} title={c.name}
                        />
                      ))}
                      
                      {data.customColors?.map(c => (
                         <button 
                          key={c} onClick={() => updateField('color', c)}
                          className={`w-8 h-8 rounded-full border-2 transition-all ${data.color === c ? 'border-zinc-900 scale-110 shadow-md' : 'border-transparent hover:scale-110'}`}
                          style={{ backgroundColor: c }} title={c}
                        />
                      ))}

                      <button 
                        onClick={() => setShowHexInput(!showHexInput)} 
                        className={`w-8 h-8 rounded-full border-2 border-dashed flex items-center justify-center transition-all ${showHexInput ? 'border-zinc-800 text-zinc-800 bg-zinc-100' : 'border-zinc-400 text-zinc-500 hover:border-zinc-800 hover:text-zinc-800'}`}
                        title="Add Custom Hex Code"
                      >
                        <Plus className="w-4 h-4" />
                      </button>
                    </div>

                    {showHexInput && (
                      <div className="mt-3 flex gap-2 max-w-xs p-3 bg-zinc-50 border border-zinc-200 rounded-lg shadow-sm">
                        <input 
                          type="text" 
                          value={tempHex} 
                          onChange={e => setTempHex(e.target.value)} 
                          placeholder="#FF5733" 
                          className="px-3 py-1.5 border border-zinc-300 rounded text-sm flex-1 outline-none focus:border-zinc-800" 
                        />
                        <button 
                          onClick={handleSaveCustomColor} 
                          className="bg-zinc-800 hover:bg-zinc-900 text-white px-3 py-1.5 rounded text-sm font-medium transition-colors"
                        >
                          Save
                        </button>
                      </div>
                    )}
                  </div>
                </SectionPanel>

                {/* Partnership Setup (Dynamic Split) */}
                <SectionPanel title="Partnership Setup" icon={Users}>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <label className="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Partner 1</label>
                      <div className="flex gap-2">
                        <input value={data.partner1.name} onChange={e => updateNestedField('partner1', 'name', e.target.value)} className="w-full px-3 py-2 border border-zinc-200 rounded-lg text-sm" placeholder="Name" />
                        <div className="relative w-20 sm:w-24 shrink-0">
                          <input type="number" min="0" max="100" value={data.partner1.split} onChange={e => handleSplitChange('partner1', e.target.value)} className="w-full pl-3 pr-6 py-2 border border-zinc-200 rounded-lg text-sm font-medium" />
                          <span className="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-400 text-xs">%</span>
                        </div>
                      </div>
                    </div>
                    <div>
                      <label className="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Partner 2</label>
                      <div className="flex gap-2">
                        <input value={data.partner2.name} onChange={e => updateNestedField('partner2', 'name', e.target.value)} className="w-full px-3 py-2 border border-zinc-200 rounded-lg text-sm" placeholder="Name" />
                        <div className="relative w-20 sm:w-24 shrink-0">
                          <input type="number" min="0" max="100" value={data.partner2.split} onChange={e => handleSplitChange('partner2', e.target.value)} className="w-full pl-3 pr-6 py-2 border border-zinc-200 rounded-lg text-sm font-medium" />
                          <span className="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-400 text-xs">%</span>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div className="mt-4 bg-indigo-50 border border-indigo-100 text-indigo-700 text-xs p-3 rounded-lg flex items-start sm:items-center gap-2">
                    <Wallet className="w-4 h-4 shrink-0 mt-0.5 sm:mt-0" />
                    <span>Net Profit will be divided based on a {p1SplitPerc}% / {p2SplitPerc}% split.</span>
                  </div>
                </SectionPanel>

                {/* Inflow: Revenue */}
                <SectionPanel title="Revenue Streams" icon={TrendingUp} className="border-emerald-200/60 shadow-emerald-900/5 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                  <div className="space-y-3">
                    {data.revenue.map((item) => (
                      <div key={item.id} className="flex flex-col sm:flex-row gap-2 relative group bg-zinc-50/50 sm:bg-transparent p-2 sm:p-0 rounded-lg border sm:border-transparent border-zinc-200">
                        <input 
                          className="flex-1 px-3 py-2 border border-zinc-200 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none"
                          placeholder="Source (e.g., Gumroad Product A)"
                          value={item.source} onChange={e => updateRevenue(item.id, 'source', e.target.value)}
                        />
                        <div className="flex gap-2 w-full sm:w-auto">
                          <div className="relative w-full sm:w-32">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm">{currencySymbol}</span>
                            <input 
                              type="number" min="0" step="any"
                              className="w-full pl-7 pr-3 py-2 border border-zinc-200 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none font-medium text-emerald-700"
                              value={item.amount} onChange={e => updateRevenue(item.id, 'amount', e.target.value)}
                            />
                          </div>
                          <button onClick={() => removeRevenue(item.id)} className="text-red-400 hover:bg-red-50 rounded-lg border border-zinc-200 sm:border-transparent p-2 sm:opacity-0 group-hover:opacity-100 transition-all shrink-0">
                            <Trash2 className="w-4 h-4" />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={addRevenue} className="mt-4 w-full sm:w-auto justify-center flex items-center gap-2 text-sm font-semibold text-emerald-700 bg-emerald-50 hover:bg-emerald-100 px-4 py-2 rounded-lg transition-all border border-emerald-200">
                    <Plus className="w-4 h-4" /> Add Revenue Source
                  </button>
                </SectionPanel>

                {/* Outflow: Deductions & Expenses */}
                <SectionPanel title="Deductions & Expenses" icon={TrendingDown} className="border-rose-200/60 shadow-rose-900/5 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full bg-rose-500"></div>
                  
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 border-b border-rose-100 pb-6">
                    <div>
                      <label className="text-[11px] font-bold text-rose-800/70 uppercase tracking-wider mb-1.5 block">Platform Fees (e.g. Stripe)</label>
                      <div className="relative">
                        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm">{currencySymbol}</span>
                        <input type="number" min="0" step="any" value={data.platformFees} onChange={e => updateField('platformFees', e.target.value)} className="w-full pl-7 pr-3 py-2 border border-rose-200 bg-rose-50/30 rounded-lg text-sm focus:border-rose-500 outline-none" />
                      </div>
                    </div>
                    <div>
                      <label className="text-[11px] font-bold text-rose-800/70 uppercase tracking-wider mb-1.5 block">Refunds Issued</label>
                      <div className="relative">
                        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm">{currencySymbol}</span>
                        <input type="number" min="0" step="any" value={data.refunds} onChange={e => updateField('refunds', e.target.value)} className="w-full pl-7 pr-3 py-2 border border-rose-200 bg-rose-50/30 rounded-lg text-sm focus:border-rose-500 outline-none" />
                      </div>
                    </div>
                  </div>

                  <h3 className="text-xs font-bold text-zinc-800 mb-3 uppercase tracking-widest">Operating Expenses</h3>
                  <div className="space-y-3">
                    {data.expenses.map((exp) => (
                      <div key={exp.id} className="flex flex-col sm:flex-row gap-2 relative group bg-zinc-50/50 sm:bg-transparent p-2 sm:p-0 rounded-lg border sm:border-transparent border-zinc-200">
                        <input 
                          className="flex-1 px-3 py-2 border border-zinc-200 rounded-lg text-sm focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none"
                          placeholder="e.g. Canva Pro, Ads"
                          value={exp.description} onChange={e => updateExpense(exp.id, 'description', e.target.value)}
                        />
                        
                        <select
                          value={exp.paidBy || 'shared'}
                          onChange={e => updateExpense(exp.id, 'paidBy', e.target.value)}
                          className="w-full sm:w-[140px] px-2 py-2 border border-zinc-200 rounded-lg text-xs focus:border-rose-500 outline-none bg-white sm:bg-zinc-50/50"
                        >
                          <option value="shared">Paid by Biz</option>
                          <option value="partner1">Paid by {data.partner1.name || 'P1'}</option>
                          <option value="partner2">Paid by {data.partner2.name || 'P2'}</option>
                        </select>

                        <div className="flex gap-2 w-full sm:w-auto">
                          <div className="relative w-full sm:w-28">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm">{currencySymbol}</span>
                            <input 
                              type="number" min="0" step="any"
                              className="w-full pl-7 pr-3 py-2 border border-zinc-200 rounded-lg text-sm focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none font-medium text-rose-700"
                              value={exp.amount} onChange={e => updateExpense(exp.id, 'amount', e.target.value)}
                            />
                          </div>
                          <button onClick={() => removeExpense(exp.id)} className="text-red-400 hover:bg-red-50 rounded-lg border border-zinc-200 sm:border-transparent p-2 sm:opacity-0 group-hover:opacity-100 transition-all shrink-0">
                            <Trash2 className="w-4 h-4" />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={addExpense} className="mt-4 w-full sm:w-auto justify-center flex items-center gap-2 text-sm font-semibold text-rose-700 bg-rose-50 hover:bg-rose-100 px-4 py-2 rounded-lg transition-all border border-rose-200">
                    <Plus className="w-4 h-4" /> Add Op Expense
                  </button>
                </SectionPanel>

                <SectionPanel title="Final Details" icon={CalendarDays}>
                  <div className="mb-4">
                    <label className="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Payout Status</label>
                    <select
                      value={data.status}
                      onChange={e => updateField('status', e.target.value)}
                      className="w-full px-3.5 py-2.5 border border-zinc-200 rounded-lg text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500/20 bg-zinc-50 outline-none"
                    >
                      <option value="pending">Pending Transfer</option>
                      <option value="settled">Settled / Paid to Partners</option>
                    </select>
                  </div>
                  <div className="flex flex-col">
                    <label className="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Report Notes</label>
                    <textarea
                      value={data.notes} onChange={e => updateField('notes', e.target.value)} placeholder="Summary of the month, thoughts, etc." rows={3}
                      className="w-full px-3.5 py-2.5 border border-zinc-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 bg-zinc-50/50 resize-y"
                    />
                  </div>
                </SectionPanel>

                <div className="pb-12 md:pb-0 flex justify-center">
                   <button onClick={clearData} className="text-sm font-medium text-red-400 hover:text-red-600 bg-red-50 px-4 py-2 rounded-lg">Reset All Data</button>
                </div>
              </div>
            </div>

            {/* === PREVIEW (RIGHT) === */}
            <div className={`print-preview-wrapper flex-1 bg-zinc-300/30 p-2 sm:p-8 overflow-y-auto flex justify-center ${activeTab === 'preview' ? 'block' : 'hidden md:flex'}`}>
              
              {/* A4 Paper Canvas */}
              <div id="preview-container" className="bg-white shadow-sm sm:shadow-2xl w-full max-w-[850px] min-h-[100%] sm:min-h-[1100px] relative mx-auto shrink-0 ring-1 ring-zinc-200 flex flex-col">
                
                {/* Top Branding Line */}
                <div className="h-2 sm:h-3 w-full absolute top-0 left-0" style={{ backgroundColor: data.color }}></div>

                <div className="px-5 py-8 sm:px-16 sm:py-16 flex-1 flex flex-col">
                  
                  {/* --- Header Section --- */}
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 sm:mb-12 border-b border-zinc-100 pb-6 sm:pb-8 gap-4">
                    <div>
                      <h1 className="text-2xl sm:text-3xl font-black tracking-tighter text-zinc-900 mb-1" style={{ color: data.color }}>{data.businessName}</h1>
                      <h2 className="text-base sm:text-lg font-medium text-zinc-400">Partnership Settlement</h2>
                    </div>
                    <div className="text-left sm:text-right bg-zinc-50 sm:bg-transparent p-3 sm:p-0 rounded-lg w-full sm:w-auto">
                      <div className="text-xs sm:text-sm text-zinc-500 mb-1"><span className="font-bold text-zinc-800">Report ID:</span> {data.id}</div>
                      <div className="text-xs sm:text-sm text-zinc-500 mb-3"><span className="font-bold text-zinc-800">Generated:</span> {data.dateGenerated}</div>
                      
                      {data.status === 'settled' ? (
                        <span className="inline-block px-3 py-1 sm:px-4 sm:py-1.5 bg-zinc-900 text-white font-bold text-[10px] sm:text-xs rounded-full uppercase tracking-widest shadow-sm">Settled</span>
                      ) : (
                        <span className="inline-block px-3 py-1 sm:px-4 sm:py-1.5 bg-amber-100 text-amber-700 font-bold text-[10px] sm:text-xs rounded-full uppercase tracking-widest border border-amber-200">Pending</span>
                      )}
                    </div>
                  </div>

                  {/* --- Period & Partners Grid --- */}
                  <div className="grid grid-cols-1 print-grid-cols-2 sm:grid-cols-2 gap-4 sm:gap-8 mb-8 sm:mb-12 bg-zinc-50 p-4 sm:p-6 rounded-xl border border-zinc-100">
                    <div>
                      <h3 className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1 sm:mb-2">Accounting Period</h3>
                      <div className="text-zinc-900 font-medium text-sm sm:text-base">{data.periodStart} &mdash; {data.periodEnd}</div>
                    </div>
                    <div>
                      <h3 className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1 sm:mb-2">Partners ({p1SplitPerc}% / {p2SplitPerc}%)</h3>
                      <div className="flex gap-3 font-medium text-zinc-900 text-sm sm:text-base">
                        <span className="flex items-center gap-1 sm:gap-1.5"><Users className="w-3 h-3 sm:w-4 sm:h-4 text-zinc-400" /> {data.partner1.name}</span>
                        <span className="text-zinc-300">|</span>
                        <span className="flex items-center gap-1 sm:gap-1.5"><Users className="w-3 h-3 sm:w-4 sm:h-4 text-zinc-400" /> {data.partner2.name}</span>
                      </div>
                    </div>
                  </div>

                  {/* --- Executive Summary Blocks --- */}
                  <div className="grid grid-cols-1 print-grid-cols-3 sm:grid-cols-3 gap-3 sm:gap-4 mb-8 sm:mb-12">
                    <div className="border border-zinc-200 rounded-xl p-4 sm:p-5 text-center shadow-sm bg-white">
                      <div className="text-[10px] uppercase font-bold text-zinc-400 tracking-wider mb-1 sm:mb-2">Gross Revenue</div>
                      <div className="text-xl sm:text-2xl font-black text-zinc-900">{formatCur(totalRevenue)}</div>
                    </div>
                    <div className="border border-rose-100 rounded-xl p-4 sm:p-5 text-center shadow-sm bg-rose-50/30">
                      <div className="text-[10px] uppercase font-bold text-rose-400 tracking-wider mb-1 sm:mb-2">Total Deductions</div>
                      <div className="text-xl sm:text-2xl font-black text-rose-600">-{formatCur(totalDeductions)}</div>
                    </div>
                    <div className="border border-zinc-900 rounded-xl p-4 sm:p-5 text-center shadow-md text-white" style={{ backgroundColor: data.color }}>
                      <div className="text-[10px] uppercase font-bold text-white/70 tracking-wider mb-1 sm:mb-2">Net Profit</div>
                      <div className="text-xl sm:text-2xl font-black text-white">{formatCur(netProfit)}</div>
                    </div>
                  </div>

                  {/* --- Detailed Breakdown --- */}
                  <div className="flex-1">
                    {/* Revenue Table */}
                    <div className="mb-8 sm:mb-10">
                      <h3 className="text-xs sm:text-sm font-bold text-zinc-800 mb-2 sm:mb-3 border-b border-zinc-200 pb-2 flex items-center gap-2">
                        <TrendingUp className="w-4 h-4 text-emerald-500" /> Revenue Inflow
                      </h3>
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm min-w-[300px]">
                          <tbody>
                            {data.revenue.map((item) => (
                              <tr key={item.id} className="border-b border-zinc-100 last:border-0">
                                <td className="py-2.5 sm:py-3 px-2 text-zinc-600">{item.source || <span className="italic text-zinc-400">Unnamed Source</span>}</td>
                                <td className="py-2.5 sm:py-3 px-2 text-right font-medium text-zinc-900">{formatCur(item.amount)}</td>
                              </tr>
                            ))}
                          </tbody>
                          <tfoot className="bg-zinc-50">
                            <tr>
                              <td className="py-2.5 sm:py-3 px-2 font-bold text-zinc-800 text-[10px] sm:text-xs uppercase">Total Gross Revenue</td>
                              <td className="py-2.5 sm:py-3 px-2 text-right font-black text-emerald-600">{formatCur(totalRevenue)}</td>
                            </tr>
                          </tfoot>
                        </table>
                      </div>
                    </div>

                    {/* Deductions Table */}
                    <div className="mb-8 sm:mb-10">
                      <h3 className="text-xs sm:text-sm font-bold text-zinc-800 mb-2 sm:mb-3 border-b border-zinc-200 pb-2 flex items-center gap-2">
                        <TrendingDown className="w-4 h-4 text-rose-500" /> Deductions & Expenses
                      </h3>
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm min-w-[300px]">
                          <tbody>
                            {parseFloat(data.platformFees) > 0 && (
                              <tr className="border-b border-zinc-100">
                                <td className="py-2.5 sm:py-3 px-2 text-zinc-600">Platform Fees</td>
                                <td className="py-2.5 sm:py-3 px-2 text-right font-medium text-zinc-900">{formatCur(parseFloat(data.platformFees))}</td>
                              </tr>
                            )}
                            {parseFloat(data.refunds) > 0 && (
                              <tr className="border-b border-zinc-100">
                                <td className="py-2.5 sm:py-3 px-2 text-zinc-600">Refunds</td>
                                <td className="py-2.5 sm:py-3 px-2 text-right font-medium text-zinc-900">{formatCur(parseFloat(data.refunds))}</td>
                              </tr>
                            )}
                            {data.expenses.map((exp) => (
                              <tr key={exp.id} className="border-b border-zinc-100 last:border-0">
                                <td className="py-2.5 sm:py-3 px-2 text-zinc-600 flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-2">
                                  <span>{exp.description || <span className="italic text-zinc-400">Unnamed Expense</span>}</span>
                                  {exp.paidBy === 'partner1' && (
                                    <span className="inline-block self-start text-[8px] sm:text-[9px] bg-zinc-100 text-zinc-500 px-1.5 py-0.5 rounded uppercase tracking-wider font-bold">Paid by {data.partner1.name}</span>
                                  )}
                                  {exp.paidBy === 'partner2' && (
                                    <span className="inline-block self-start text-[8px] sm:text-[9px] bg-zinc-100 text-zinc-500 px-1.5 py-0.5 rounded uppercase tracking-wider font-bold">Paid by {data.partner2.name}</span>
                                  )}
                                </td>
                                <td className="py-2.5 sm:py-3 px-2 text-right font-medium text-zinc-900 align-top sm:align-middle">{formatCur(exp.amount)}</td>
                              </tr>
                            ))}
                          </tbody>
                          <tfoot className="bg-rose-50/50">
                            <tr>
                              <td className="py-2.5 sm:py-3 px-2 font-bold text-rose-900 text-[10px] sm:text-xs uppercase">Total Deductions</td>
                              <td className="py-2.5 sm:py-3 px-2 text-right font-black text-rose-600">{formatCur(totalDeductions)}</td>
                            </tr>
                          </tfoot>
                        </table>
                      </div>
                    </div>
                  </div>

                  {/* --- Partner Payout Section --- */}
                  <div className="mt-8 sm:mt-12 pt-6 sm:pt-8">
                    <div className="bg-white border-t-8 border-zinc-200 text-zinc-900 rounded-xl sm:rounded-2xl p-6 sm:p-8 shadow-xl border-x border-b" style={{ borderTopColor: data.color }}>
                      <h3 className="text-[10px] sm:text-xs font-bold text-zinc-400 uppercase tracking-widest mb-6 sm:mb-8 text-center">Final Partner Settlement</h3>
                      
                      <div className="flex flex-col sm:flex-row print-flex-row justify-center items-center gap-6 sm:gap-12">
                        <div className="text-center w-full print-w-half sm:w-1/2">
                          <div className="text-zinc-500 text-xs sm:text-sm font-medium mb-1">{data.partner1.name}</div>
                          <div className="text-2xl sm:text-3xl font-black" style={{ color: data.color }}>{formatCur(partner1FinalPayout)}</div>
                          {p1Reimbursement > 0 ? (
                            <div className="text-[9px] sm:text-[10px] text-zinc-500 mt-2 uppercase tracking-wider font-semibold">
                              {formatCur(partner1BaseShare)} ({p1SplitPerc}%) + {formatCur(p1Reimbursement)} Reimbursed
                            </div>
                          ) : (
                            <div className="text-[9px] sm:text-[10px] text-zinc-400 mt-2 uppercase tracking-wider font-semibold">Base Profit ({p1SplitPerc}%) Only</div>
                          )}
                        </div>
                        
                        {/* Dividers: Horizontal for Mobile, Vertical for Desktop/Print */}
                        <div className="hidden sm:block print-divider-v w-px h-16 bg-zinc-200"></div>
                        <div className="sm:hidden print-divider-h h-px w-32 bg-zinc-200"></div>
                        
                        <div className="text-center w-full print-w-half sm:w-1/2">
                          <div className="text-zinc-500 text-xs sm:text-sm font-medium mb-1">{data.partner2.name}</div>
                          <div className="text-2xl sm:text-3xl font-black" style={{ color: data.color }}>{formatCur(partner2FinalPayout)}</div>
                          {p2Reimbursement > 0 ? (
                            <div className="text-[9px] sm:text-[10px] text-zinc-500 mt-2 uppercase tracking-wider font-semibold">
                              {formatCur(partner2BaseShare)} ({p2SplitPerc}%) + {formatCur(p2Reimbursement)} Reimbursed
                            </div>
                          ) : (
                            <div className="text-[9px] sm:text-[10px] text-zinc-400 mt-2 uppercase tracking-wider font-semibold">Base Profit ({p2SplitPerc}%) Only</div>
                          )}
                        </div>
                      </div>
                    </div>

                    {data.notes && (
                      <div className="mt-6 sm:mt-8 text-center px-4 sm:px-12">
                        <p className="text-xs sm:text-sm text-zinc-500 italic">"{data.notes}"</p>
                      </div>
                    )}
                  </div>

                </div>
              </div>
            </div>

          </main>
        </div>
      );
    }

    // --- Render App ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
